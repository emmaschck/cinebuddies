<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBuddies</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Montserrat, sans-serif;
      background: #f6f1eb;
      color: #1f1f1f;
      line-height: 1.6;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(246,241,235,0.95);
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #550000;
      font-weight: 600;
    }

    section {
      padding: 100px 20px;
      max-width: 900px;
      margin: auto;
    }

    h1, h2 {
      font-family: "Playfair Display", serif;
      color: #550000;
    }

    .hero {
      text-align: center;
      padding-top: 140px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero h2 {
      font-size: 24px;
      font-weight: normal;
      color: #a85307;
    }
</html>
